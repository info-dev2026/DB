<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Saaphzone OCEMS — Real-Time Emission & Effluent Monitoring</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0b1f17; --ground:#0f261c; --ground-2:#123024; --line:#1d4335;
  --paper:#f3f6f2; --paper-2:#ffffff; --paper-line:#dbe5dd;
  --brand:#1B5E20; --brand-2:#2e8b3d; --accent:#0aa4b0;
  --mute:#5a6b60; --mute-d:#8ca396;
  /* Status colors per client spec */
  --st-green:#1fa971;   /* Normal / Compliant */
  --st-yellow:#f5c518;  /* Warning / Attention */
  --st-red:#e23b2e;     /* Exceedance / Non-compliant */
  --st-grey:#8a978d;    /* Offline / No data */
  --st-orange:#e8722b; --st-purple:#7b3fe4;
  --shadow:0 1px 2px rgba(11,31,23,.06),0 8px 24px rgba(11,31,23,.06);
  --shadow-lg:0 2px 4px rgba(11,31,23,.08),0 20px 50px rgba(11,31,23,.12);
  --r:14px; --r-sm:9px;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;}
input,textarea,select{user-select:text}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{-webkit-user-drag:none;user-drag:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c3d1c6;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
/* ============ LAYOUT ============ */
.app{display:flex;min-height:100vh}
.sidebar{width:250px;flex-shrink:0;background:var(--ground);color:#dfe9e2;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;border-right:1px solid var(--line)}
.sb-brand{padding:20px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.sb-brand img{width:38px;height:38px;border-radius:9px;background:#fff;padding:3px;flex-shrink:0}
.sb-brand .bt{font-weight:800;font-size:15px;letter-spacing:-.2px;color:#fff;line-height:1.1}
.sb-brand .bs{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute-d);margin-top:2px}
.sb-role{margin:12px;padding:8px 12px;border-radius:8px;background:var(--ground-2);font-size:11px;color:var(--mute-d);display:flex;align-items:center;gap:8px}
.sb-role b{color:#fff;font-weight:600}
.sb-nav{padding:8px 12px 14px;flex:1;overflow-y:auto}
.sb-sec{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mute-d);padding:14px 12px 7px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);color:#c3d3c9;
  font-size:13.5px;font-weight:500;margin-bottom:2px;transition:background .13s,color .13s;cursor:pointer}
.sb-item:hover{background:var(--ground-2);color:#fff}
.sb-item.on{background:var(--brand);color:#fff}
.sb-item .ic{width:18px;text-align:center;flex-shrink:0;opacity:.9;font-size:14px}
.sb-foot{padding:14px 18px;border-top:1px solid var(--line);font-size:11px;color:var(--mute-d)}
.sb-foot .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--st-green);margin-right:6px;box-shadow:0 0 0 3px rgba(31,169,113,.2)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:var(--paper-2);border-bottom:1px solid var(--paper-line);display:flex;
  align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:40}
.tb-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.tb-title .sub{font-size:12px;font-weight:500;color:var(--mute);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:12px}
.clock{font-family:var(--mono);font-size:12.5px;color:var(--mute);font-weight:500}
.tb-badge{display:flex;align-items:center;gap:7px;background:#eef4ef;padding:7px 12px;border-radius:20px;font-size:12px;font-weight:600;color:var(--brand)}
.tb-badge .pulse{width:8px;height:8px;border-radius:50%;background:var(--st-green);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.content{padding:24px;max-width:1440px;width:100%}

/* support button */
.support-btn{display:flex;align-items:center;gap:7px;background:var(--st-red);color:#fff;padding:8px 14px;
  border-radius:20px;font-size:12.5px;font-weight:600;transition:background .13s}
.support-btn:hover{background:#c22b1f}
.support-btn.ghost{background:#fff;color:var(--st-red);border:1px solid #f3c9c5}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:var(--r);padding:17px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .edge{position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi .kl{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:600;margin-bottom:8px}
.kpi .kv{font-size:28px;font-weight:800;letter-spacing:-1px;font-family:var(--mono);line-height:1}
.kpi .kd{font-size:11.5px;color:var(--mute);margin-top:7px}
.kpi.g .edge{background:var(--st-green)} .kpi.y .edge{background:var(--st-yellow)}
.kpi.r .edge{background:var(--st-red)} .kpi.gr .edge{background:var(--st-grey)}
.kpi.o .edge{background:var(--st-orange)} .kpi.p .edge{background:var(--st-purple)}
.kpi.b .edge{background:var(--accent)}

/* panels */
.panel{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.panel-h{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--paper-line);gap:12px;flex-wrap:wrap}
.panel-h h3{font-size:14.5px;font-weight:700;letter-spacing:-.2px}
.panel-h .hint{font-size:12px;color:var(--mute)}
.panel-b{padding:20px}
.panel-b.flush{padding:0}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start}
@media(max-width:1000px){.two-col{grid-template-columns:1fr}}

/* chart canvas wrap */
.chart-wrap{position:relative;width:100%}
.chart-sm{height:220px} .chart-md{height:280px} .chart-lg{height:340px}

/* map */
#siteMap{height:420px;width:100%;border-radius:0 0 var(--r) var(--r);z-index:1}
.leaflet-popup-content{font-family:var(--sans);font-size:13px}
.map-pop b{font-size:13.5px} .map-pop .mp-row{color:#5a6b60;font-size:12px;margin-top:3px}
.map-pop .mp-badge{display:inline-block;padding:2px 8px;border-radius:5px;color:#fff;font-size:10.5px;font-weight:700;margin-top:6px}

/* status chips + legend */
.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:600;border:1px solid var(--paper-line);color:var(--mute);background:var(--paper-2);display:flex;align-items:center;gap:6px;transition:all .12s}
.chip:hover{border-color:#bcccbf}.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .cdot{width:8px;height:8px;border-radius:50%}
.search{flex:1;min-width:170px;max-width:280px;padding:8px 13px;border:1px solid var(--paper-line);border-radius:20px;font-size:13px;background:var(--paper-2)}
.search:focus{outline:none;border-color:var(--brand)}
.legend-inline{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mute)}
.legend-inline span{display:flex;align-items:center;gap:6px}
.legend-inline .ld{width:10px;height:10px;border-radius:3px}

/* site cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.icard{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;transition:transform .14s,box-shadow .14s;cursor:pointer}
.icard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.icard-top{padding:15px 16px 12px;display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--paper-line)}
.icard-name{font-size:14px;font-weight:700;letter-spacing:-.2px;line-height:1.25}
.icard-meta{font-size:11px;color:var(--mute);margin-top:4px}
.sig{flex-shrink:0;padding:5px 10px;border-radius:7px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#fff;height:fit-content;display:flex;align-items:center;gap:5px;white-space:nowrap}
.sig .sd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.9)}
.sig.green{background:var(--st-green)} .sig.yellow{background:var(--st-yellow);color:#3a2e00}
.sig.red{background:var(--st-red)} .sig.grey{background:var(--st-grey)}
.sig.orange{background:var(--st-orange)} .sig.purple{background:var(--st-purple)} .sig.delay{background:#b98a1e}
.icard-mini{height:70px;padding:6px 10px 4px}
.icard-params{padding:11px 16px;display:flex;flex-wrap:wrap;gap:6px}
.ppill{font-family:var(--mono);font-size:10.5px;padding:3px 7px;border-radius:6px;background:var(--paper);border:1px solid var(--paper-line);font-weight:500}
.ppill.exc{background:#fdeceb;border-color:#f6c4c0;color:#b3271d}
.ppill .pn{color:var(--mute);font-weight:600;margin-right:3px}
.icard-foot{padding:10px 16px;border-top:1px solid var(--paper-line);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mute)}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:11px 15px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:600;border-bottom:1px solid var(--paper-line);background:var(--paper)}
.tbl td{padding:11px 15px;border-bottom:1px solid var(--paper-line)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.rowlink{cursor:pointer}.tbl tr.rowlink:hover td{background:#f7faf7}
.tbl .mono{font-family:var(--mono);font-size:12px}
.val-exc{color:var(--st-red);font-weight:700}

/* status badge small */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:3px 9px;border-radius:5px;color:#fff}
.badge.green{background:var(--st-green)}.badge.yellow{background:var(--st-yellow);color:#3a2e00}
.badge.red{background:var(--st-red)}.badge.grey{background:var(--st-grey)}
.badge.orange{background:var(--st-orange)}.badge.purple{background:var(--st-purple)}
.badge.open{background:#e8722b}.badge.progress{background:#3b82c4}.badge.resolved{background:var(--st-green)}
.badge.pending{background:#b98a1e}.badge.approved{background:var(--st-green)}.badge.rejected{background:var(--st-red)}
.badge.on2{background:var(--st-green)}.badge.off2{background:var(--st-grey)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:all .13s}
.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:#175019}
.btn-ghost{border:1px solid var(--paper-line);color:var(--ink)}.btn-ghost:hover{border-color:#bcccbf;background:var(--paper)}
.btn-red{background:var(--st-red);color:#fff}.btn-red:hover{background:#c22b1f}
.btn-sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* detail */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--brand);font-weight:600;margin-bottom:14px;cursor:pointer}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.dh-name{font-size:23px;font-weight:800;letter-spacing:-.6px}
.dh-meta{font-size:12.5px;color:var(--mute);margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}
.gauge-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:13px;margin-bottom:20px}
.gauge{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow)}
.gauge .gp{font-size:11.5px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.04em}
.gauge .gv{font-family:var(--mono);font-size:24px;font-weight:700;margin-top:7px;letter-spacing:-.5px}
.gauge .gu{font-size:11.5px;color:var(--mute);font-weight:500;margin-left:3px}
.gauge .glim{font-size:11px;color:var(--mute);margin-top:6px}
.gbar{height:6px;background:var(--paper);border-radius:4px;margin-top:8px;overflow:hidden}
.gbar i{display:block;height:100%;border-radius:4px;transition:width .5s}

/* forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px 18px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.wide{grid-column:1/-1}
.fg label{font-size:12.5px;font-weight:600}
.fg .req{color:var(--st-red)}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1px solid var(--paper-line);border-radius:var(--r-sm);font-size:13.5px;font-family:inherit;color:var(--ink);background:var(--paper-2);width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(27,94,32,.09)}
.fg .hint{font-size:11.5px;color:var(--mute)}
.fg textarea{resize:vertical;min-height:80px}
.checkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.chk{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--paper-line);border-radius:var(--r-sm);font-size:12.5px;font-weight:500;cursor:pointer}
.chk input{width:15px;height:15px;accent-color:var(--brand)}
.chk.on{border-color:var(--brand);background:#f0f6f1}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--paper-line)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(11,31,23,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--paper-2);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--paper-line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:16px;font-weight:700}
.modal-x{font-size:22px;color:var(--mute);cursor:pointer;line-height:1}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--paper-line);display:flex;gap:10px;justify-content:flex-end}

/* service engineer card */
.eng-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:linear-gradient(135deg,#f0f6f1,#e8f2ea);border:1px solid #cfe3d4;border-radius:var(--r)}
.eng-av{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.eng-info b{font-size:14px}.eng-info .er{font-size:12px;color:var(--mute);margin-top:2px}
.eng-info .em{font-family:var(--mono);font-size:13px;color:var(--brand);font-weight:600}

/* toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:400;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ground);color:#fff;padding:13px 17px;border-radius:var(--r-sm);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:11px;font-size:13px;font-weight:500;min-width:280px;max-width:360px;animation:slidein .3s;border-left:4px solid var(--brand)}
.toast.alert{border-left-color:var(--st-orange)}.toast.crit{border-left-color:var(--st-red)}
@keyframes slidein{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast .tclose{margin-left:auto;color:var(--mute-d);font-size:18px;line-height:1;cursor:pointer}

/* login gate */
.gate{position:fixed;inset:0;background:linear-gradient(135deg,#0f261c,#0b1f17);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.gate-card{background:var(--paper-2);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:410px;padding:32px 32px;text-align:center;margin:auto}
.gate-card img{width:60px;height:60px;border-radius:14px;margin-bottom:14px}
.gate-card h1{font-size:20px;font-weight:800;letter-spacing:-.4px}
.gate-card p{font-size:12.5px;color:var(--mute);margin-top:5px;margin-bottom:20px}
.role-tabs{display:flex;gap:6px;background:var(--paper);padding:5px;border-radius:11px;margin-bottom:20px}
.role-tab{flex:1;padding:9px 4px;border-radius:8px;font-size:11.5px;font-weight:600;color:var(--mute);text-align:center;cursor:pointer;transition:all .13s}
.role-tab.on{background:var(--paper-2);color:var(--brand);box-shadow:var(--shadow)}
.gate-card .fg{text-align:left;margin-bottom:13px}
.gate-err{font-size:12px;color:var(--st-red);font-weight:600;min-height:15px;text-align:left;margin-bottom:6px}
.gate-hint{font-size:11px;color:var(--mute);margin-top:16px;line-height:1.6}

.wm{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.028;background-repeat:repeat;background-size:340px}

.empty{padding:44px 20px;text-align:center;color:var(--mute);font-size:13.5px}

@media(max-width:880px){
  .sidebar{position:fixed;left:-260px;transition:left .25s;z-index:200}
  .sidebar.open{left:0}
  .form-grid{grid-template-columns:1fr}
  .menu-btn{display:flex!important}
  .clock{display:none}
}
.menu-btn{display:none;width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;background:var(--paper);border:1px solid var(--paper-line)}
</style>
</head>
<body>
<div class="wm" id="wm"></div>

<!-- LOGIN GATE -->

<script>
/* =========================================================
   SAAPHZONE OCEMS v2 — Data layer + CPCB engine
   Persistence: localStorage (survives refresh; ~1yr retention
   of daily rollups per client spec).
   ========================================================= */
const DB_KEY='index';

/* =========================================================
   DATA SOURCE CONFIGURATION
   ---------------------------------------------------------
   DATA_MODE controls where live readings come from:
     'simulation' — built-in demo generator (random values every few sec)
     'live'       — poll a real backend endpoint for readings (no fake data)
     'off'        — no auto-updates at all; values change only when you
                    push them in via ingestReadings() or the admin UI.

   To connect your data logger / backend, set DATA_MODE='live' and set
   API_BASE + (optionally) API_KEY below. The portal will GET readings from:
       {API_BASE}/readings?since=<ms>
   expecting JSON like:
     { "readings": [
         { "siteId":"ESK-4417", "param":"PM", "pid":"ESK-4417-PM",
           "value":42.7, "ts":1720000000000 },
         ...
     ] }
   Any of siteId+param OR pid identifies the channel. ts is optional.
   These settings persist in localStorage and are editable in
   Admin ▸ Data Source (no code editing needed).
   ========================================================= */
let DATA_CFG = {
  mode: 'live',          // 'simulation' | 'live' | 'off'
  apiBase: 'https://paying-distress-reboot.ngrok-free.dev/api/',                 // e.g. 'https://dashboard.saaphzone.com/api'
  apiKey: 'sz_portal_ef2fccdf518ba7f04c864a5b69511a2c8948b7e7721d50bc',                  // sent as header: Authorization: Bearer <key>
  pollSeconds: 30,             // how often to fetch in 'live' mode
  simSeconds: 4                // simulator tick interval
};
const CFG_KEY='saaphzone_ocems_cfg';
function loadCfg(){try{const r=localStorage.getItem(CFG_KEY);if(r)DATA_CFG=Object.assign(DATA_CFG,JSON.parse(r));}catch(e){}}
function saveCfg(){try{localStorage.setItem(CFG_KEY,JSON.stringify(DATA_CFG));}catch(e){}}
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

/* ---- Dynamic parameter registry (admin can add/edit/remove) ---- */
let PARAMS = {
  PM:  {pid:'P-PM',   unit:'mg/Nm³', limit:50,  dev:60,  type:'stack', label:'Particulate Matter'},
  SO2: {pid:'P-SO2',  unit:'mg/Nm³', limit:200, dev:25,  type:'stack', label:'Sulphur Dioxide'},
  NOx: {pid:'P-NOX',  unit:'mg/Nm³', limit:300, dev:25,  type:'stack', label:'Oxides of Nitrogen'},
  CO:  {pid:'P-CO',   unit:'mg/Nm³', limit:100, dev:25,  type:'stack', label:'Carbon Monoxide'},
  Flow:{pid:'P-FLOW', unit:'m³/s',   limit:5,   dev:50,  type:'stack', label:'Stack Flow'},
  Temperature:{pid:'P-TEMP', unit:'°C', limit:180, dev:40, type:'stack', label:'Flue Temperature'},
  Pressure:{pid:'P-PRES', unit:'mmH₂O', limit:120, dev:40, type:'stack', label:'Static Pressure'},
  pH:  {pid:'P-PH',   unit:'',     limit:8.5, min:6.5, dev:0,   type:'etp', ph:true, label:'pH'},
  BOD: {pid:'P-BOD',  unit:'mg/L', limit:30,  dev:100, type:'etp', label:'Biochemical Oxygen Demand'},
  COD: {pid:'P-COD',  unit:'mg/L', limit:250, dev:100, type:'etp', label:'Chemical Oxygen Demand'},
  TSS: {pid:'P-TSS',  unit:'mg/L', limit:100, dev:100, type:'etp', label:'Total Suspended Solids'},
  TOC: {pid:'P-TOC',  unit:'mg/L', limit:100, dev:100, type:'etp', label:'Total Organic Carbon'},
};

const SIG_COLOR={green:'var(--st-green)',yellow:'var(--st-yellow)',orange:'var(--st-orange)',

/* ---------- CPCB grading (same thresholds, 'green' = compliant) ---------- */
function gradeParameter(p){
  const def=PARAMS[p.key]||{};
  const isEtp=def.type==='etp';
  if(p.connHrs>=168) return 'purple';
  if(p.redCount30>1) return 'purple';
  if(isEtp && p.y30>=192) return 'purple';
  if(def.ph && (p.phVal<4||p.phVal>12)) return 'purple';
  if(p.stableHrs>=168) return 'purple';
  if(p.excStreak>=8) return 'red';
  if(p.y30>=54) return 'red';
  if(p.connHrs>=96) return 'red';
  if(p.y30conn>=18) return 'red';
  if(p.stableHrs>=144) return 'red';
  if(p.excStreak>=4) return 'orange';
  if(p.y30>=27) return 'orange';
  if(p.connHrs>=48) return 'orange';
  if(p.y30conn>=12) return 'orange';
  if(p.stableHrs>=72) return 'orange';
  if(p.yToday>=2) return 'yellow';
  if(p.connFailHrsToday>=4) return 'yellow';
  if(p.stableHrs>=48) return 'yellow';
  return 'green';
}
function rollup(params,connectivity,enabled){
  if(enabled===false) return 'grey';
  if(connectivity==='grey') return 'grey';
  let worst=connectivity==='delay'?'delay':'green';
  params.forEach(p=>{if(RANK[p.signal]>RANK[worst])worst=p.signal;});
  return worst;
}
const ACTIONS={
  yellow:'Corrective measures required immediately. Record incidence for SPCB/CPCB.',
  orange:'Corrective action + notify SPCB/CPCB of incidence and measures taken.',
  red:'Immediately impound discharge/emission. Submit 24-hr report; inspection priority.',
  purple:'Impound discharge. Root-Cause Analysis + Action-Taken Report to SPCB/CPCB.',
  grey:'No data > 48 h. Restore connectivity; notify CPCB/SPCB.',
  delay:'No data in last 4 h. Check internet/power/sensor.',
};
function triggerReason(p){
  const s=p.signal;
  if(s==='green') return 'Within limits';
  if(s==='delay') return 'Data delayed';
  if(s==='grey') return 'Offline';
  const b=[];
  if(p.excStreak>=8)b.push('8 consecutive exceedances');
  else if(p.excStreak>=4)b.push('4 consecutive exceedances');
  else if(p.yToday>=2)b.push(p.yToday+' exceedances today');
  if(p.y30>=54)b.push(p.y30+' warnings/30d (15%)');
  else if(p.y30>=27)b.push(p.y30+' warnings/30d (7.5%)');
  if(p.connHrs>=48)b.push('conn-fail '+p.connHrs+'h');
  if(p.stableHrs>=48)b.push('frozen sensor '+Math.round(p.stableHrs)+'h');
  if(PARAMS[p.key]&&PARAMS[p.key].ph&&(p.phVal<4||p.phVal>12))b.push('pH out of 4–12');
  return b.join(' · ')||'Exceedance';
}

function pidFor(siteId,key){
  const suffix=(PARAMS[key]&&PARAMS[key].pid)?PARAMS[key].pid.replace(/^P-/,''):key.toUpperCase().replace(/[^A-Z0-9]/g,'');
  return (siteId?siteId.toUpperCase()+'-':'')+suffix;
}
function seedParam(key,scenario,siteId){
  const n=PARAMS[key];if(!n)return null;
  let base=n.ph?7.4:n.limit*0.55;
  let p={key,pid:pidFor(siteId,key),unit:n.unit,limit:n.limit,min:n.min,value:n.ph?base:+base.toFixed(1),
    yToday:0,y30:0,y30conn:0,connHrs:0,connFailHrsToday:0,stableHrs:0,excStreak:0,
    redCount30:0,phVal:n.ph?base:null,history:[]};
  for(let i=0;i<24;i++){let v=n.ph?7.2+Math.sin(i/3)*0.4:n.limit*(0.45+Math.random()*0.25);p.history.push(+v.toFixed(1));}
  if(scenario==='yellow'&&Math.random()<0.5){p.yToday=2;p.value=+(n.limit*1.15).toFixed(1);if(n.ph)p.phVal=p.value;}
  if(scenario==='orange'&&Math.random()<0.5){p.y30=29;p.excStreak=4;p.value=+(n.limit*1.3).toFixed(1);if(n.ph)p.phVal=p.value;}
  if(scenario==='red'&&Math.random()<0.45){p.y30=56;p.excStreak=8;p.value=+(n.limit*1.5).toFixed(1);if(n.ph)p.phVal=p.value;}
  if(scenario==='purple'&&key==='pH'){p.phVal=3.6;p.value=3.6;p.redCount30=2;}
  if(scenario==='stable'&&Math.random()<0.4){p.stableHrs=52;}
  p.signal=gradeParameter(p);
  return p;
}

function GPKG(){return (typeof STATE!=='undefined'&&STATE&&STATE.packages)||DEFAULT_PACKAGES;}
/* Site-aware catalogue: a site may carry its own independent `catalogue`. */
function PKG(site){return (site&&site.catalogue)||GPKG();}
function pkgTiers(group,site){const g=PKG(site)[group];return g?g.tiers:[];}
function pkgMeta(group,site){return PKG(site)[group]||{name:group,perEquip:false,tiers:[]};}
function pkgGroup_fromPackageId(pid,site){let found=null;Object.values(PKG(site)).forEach(g=>g.tiers.forEach(t=>{if(t.id===pid)found=t;}));return found;}
const DAY=86400000;
function addMonths(ts,m){const d=new Date(ts);d.setMonth(d.getMonth()+m);return d.getTime();}
/* returns status for a contract (object with expiry & optional suspended) or a raw expiry ts */
function serviceStatus(c){
  const expiry=(c&&typeof c==='object')?c.expiry:c;
  if(c&&typeof c==='object'&&c.suspended)
    return {code:'suspended',label:'Suspended',color:'var(--st-grey)',hex:'#8a978d',days:expiry?Math.ceil((expiry-Date.now())/DAY):null};
  if(!expiry)return {code:'none',label:'Not set',color:'var(--st-grey)',hex:'#8a978d',days:null};
  const days=Math.ceil((expiry-Date.now())/DAY);
  if(days<0)  return {code:'expired', label:'Expired',      color:'var(--st-red)',   hex:'#e23b2e', days};
  if(days<=7) return {code:'week',    label:'≤ 1 week',     color:'var(--st-red)',   hex:'#e23b2e', days};
  if(days<=15)return {code:'d15',     label:'≤ 15 days',    color:'var(--st-orange)',hex:'#e8722b', days};
  if(days<=30)return {code:'m1',      label:'≤ 1 month',    color:'var(--st-orange)',hex:'#e8722b', days};
  if(days<=60)return {code:'m2',      label:'≤ 2 months',   color:'var(--st-yellow)',hex:'#f5c518', days};
  return {code:'ok',label:'Active',color:'var(--st-green)',hex:'#1fa971',days};
}
/* build the default set of 7 contracts for a site, with varied demo expiries */
function seedServices(seedOffsetDays){
  const now=Date.now();
  const off=seedOffsetDays||{};
  const mk=(days)=>({start:now-Math.round((365-Math.max(0,days))* (days>0?1:0))*DAY, expiry:now+days*DAY, package:null, history:[], suspended:false});
  return {
    DTC: mk(off.dtc!=null?off.dtc:300),
    'AMC|Gas Analyser':   mk(off.amcGas!=null?off.amcGas:52),
    'AMC|Water Analyser': mk(off.amcWater!=null?off.amcWater:120),
    'AMC|SPM':            mk(off.amcSpm!=null?off.amcSpm:12),
    'CMC|Gas Analyser':   mk(off.cmcGas!=null?off.cmcGas:200),
    'CMC|Water Analyser': mk(off.cmcWater!=null?off.cmcWater:6),
    'CMC|SPM':            mk(off.cmcSpm!=null?off.cmcSpm:-5),
  };
}
/* all possible contract keys from a catalogue (global, or a site's own) */
function catalogueKeys(site){
  const out=[];const cat=PKG(site);
  Object.keys(cat).forEach(group=>{
    const m=cat[group]||{};
    if(m.perEquip)SERVICE_EQUIP.forEach(e=>out.push(group+'|'+e));
    else out.push(group);
  });
  return out;
}
/* keys a specific site actually holds */
function serviceKeys(site){
  if(site&&site.services)return catalogueKeys(site).filter(k=>site.services[k]);
  const out=['DTC'];
  SERVICE_EQUIP.forEach(e=>out.push('AMC|'+e));
  SERVICE_EQUIP.forEach(e=>out.push('CMC|'+e));
  return out;
}
function serviceLabel(key,site){
  const [t,e]=key.split('|');const m=pkgMeta(t,site);
  return {type:t,name:m.name||t,equip:e||'—'};
}
function pkgGroup(key){return key.split('|')[0];}
/* worst service status across a site's contracts */
function siteServiceAlert(site){
  if(!site.services)return null;
  let worst=null;const order={expired:6,week:5,d15:4,m1:3,m2:2,suspended:1,ok:1,none:0};
  serviceKeys(site).forEach(k=>{
    if(site.services[k]&&site.services[k].suspended)return;
    const st=serviceStatus(site.services[k]);
    if(!worst||order[st.code]>order[worst.code])worst={...st,key:k};
  });
  return worst;
}

/* ---- clocks + live sim ---- */
let clockTimer,tickTimer;
function startClocks(){
  clock();clearInterval(clockTimer);clockTimer=setInterval(clock,1000);
  restartDataTimers();
}
function restartDataTimers(){
  clearInterval(tickTimer);tickTimer=null;
  clearInterval(pollTimer);pollTimer=null;
  if(DATA_CFG.mode==='simulation'){
    tickTimer=setInterval(tick,Math.max(1,DATA_CFG.simSeconds||4)*1000);
  }else if(DATA_CFG.mode==='live'){
    Promise.resolve().then(pollLiveData).catch(()=>{}); // immediate first pull
    pollTimer=setInterval(()=>{Promise.resolve().then(pollLiveData).catch(()=>{});},Math.max(5,DATA_CFG.pollSeconds||30)*1000);
  }
  // mode 'off' starts no timers
}

/* ---------- KPI computation ---------- */
function computeKPIs(sites){
  let k={total:sites.length,green:0,yellow:0,orange:0,red:0,purple:0,grey:0,delay:0};
  sites.forEach(s=>{k[s.signal]=(k[s.signal]||0)+1;});
  k.warn=k.yellow; k.exc=k.red+k.orange+k.purple; k.offline=k.grey+k.delay;
  k.compliant=k.green;
  k.alerts24=STATE.alerts.filter(a=>Date.now()-a.time<86400000).length;
  return k;
}

function drawStatusChart(k){

function drawParamChart(sites){
  const cv=$('#chParam');if(!cv||!window.Chart)return;
  const counts={};
  sites.forEach(s=>s.params.forEach(p=>{
    if(['yellow','orange','red','purple'].includes(p.signal))counts[p.key]=(counts[p.key]||0)+1;}));
  const keys=Object.keys(counts);const vals=keys.map(k=>counts[k]);
  if(!keys.length){cv.parentElement.innerHTML='<div class="empty">No active exceedances. All parameters within limits.</div>';return;}
  CHARTS.param=new Chart(cv,{type:'bar',data:{labels:keys,
    datasets:[{data:vals,backgroundColor:keys.map((_,i)=>['#e23b2e','#e8722b','#f5c518','#7b3fe4','#0aa4b0'][i%5]),borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});
}

function drawTrend(s){
  const cv=$('#chTrend');if(!cv||!window.Chart)return;
  const palette=['#1B5E20','#0aa4b0','#e8722b','#7b3fe4','#e23b2e','#3b82c4','#b98a1e'];
  const ds=s.params.map((p,i)=>({label:p.key,data:p.history,borderColor:palette[i%palette.length],
    borderWidth:2,pointRadius:0,tension:.32,fill:false}));
  CHARTS.trend=new Chart(cv,{type:'line',
    data:{labels:s.params[0]?s.params[0].history.map((_,i)=>(-((s.params[0].history.length-1-i))*15)+'m'):[],datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},
      scales:{y:{beginAtZero:true},x:{ticks:{maxTicksLimit:8,font:{size:10}}}}}});
}

  const inp=el('input','search');inp.id='adminSiteSearch';inp.placeholder='Search by site name…';inp.value=ADMIN_QUERY||'';

    : `<thead><tr><th>Site</th><th>Code</th><th>Status</th><th>Actions</th></tr></thead>`;
  const tb=el('tbody');
  t.append(tb);w.append(t);panel.append(w);wrap.append(panel);
  const ncols=isAdmin?6:4;
  function fill(q){
    tb.innerHTML='';
    const ql=(q||'').trim().toLowerCase();
    let list=STATE.sites.slice();
    if(ql)list=list.filter(s=>s.name.toLowerCase().includes(ql)||s.id.toLowerCase().includes(ql)||(s.sector||'').toLowerCase().includes(ql));
    if(!list.length){tb.innerHTML=`<tr><td colspan="${ncols}"><div class="empty">No site matches “${q}”.</div></td></tr>`;return;}
    list.forEach(s=>{
      const tr=el('tr');
      const td=el('td');td.innerHTML=`<b>${s.name}</b><br><span style="color:var(--mute);font-size:11px">${s.sector} · ${s.loc}</span>`;
      tr.append(td);
      tr.append(el('td','mono',s.id));
      tr.append(el('td',null,`<span class="badge ${s.signal}">${SIG_LABEL[s.signal]}</span>`));
      if(isAdmin){
        const dt=el('td');const stbtn=el('button','btn btn-sm '+(s.running?'btn-ghost':'btn-primary'),s.running?'■ Stop':'▶ Start');
        stbtn.onclick=()=>{s.running=!s.running;if(!s.running){s.connectivity='grey';}else{s.connectivity='live';s.lastData='just now';}

        dt.append(stbtn);tr.append(dt);
        const vt=el('td');const vbtn=el('button','btn btn-sm btn-ghost',s.enabled?'👁 Visible':'🚫 Hidden');
        vbtn.onclick=()=>{s.enabled=!s.enabled;s.signal=rollup(s.params,s.running?'green':'grey',s.enabled);save();toast(s.name+(s.enabled?' visible':' hidden')+'.');render();};
        vt.append(vbtn);tr.append(vt);

      const at=el('td');at.style.whiteSpace='nowrap';
      const eb=el('button','btn btn-sm btn-ghost','Edit');eb.onclick=()=>siteForm(s);
      at.append(eb);
      if(isAdmin){
        const db=el('button','btn btn-sm btn-red','Delete');db.style.marginLeft='6px';
        db.onclick=()=>{if(confirm('Delete '+s.name+'? This removes all its data.')){
          STATE.sites=STATE.sites.filter(x=>x.id!==s.id);save();toast(s.name+' deleted.');render();}};
        at.append(db);
      }
      tr.append(at);
      tb.append(tr);
    });
  }
  fill(ADMIN_QUERY);
  const doSearch=()=>{ADMIN_QUERY=inp.value;fill(inp.value);};

  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  inp.addEventListener('input',()=>fill(inp.value));
  cbtn.onclick=()=>{inp.value='';ADMIN_QUERY='';fill('');};
  return wrap;
}

    <div class="fg"><label>ETP outlets</label><input id="s_etp" type="number" min="0" value="${s.etp!=null?s.etp:1}"></div>
    <div class="fg"><label>Contact person</label><input id="s_contact" value="${s.contact||''}"></div>
    <div class="fg"><label>Alert mobile / email</label><input id="s_phone" value="${s.phone||''}"></div>
    <div class="fg wide"><label>Monitored parameters <span class="req">*</span></label>
      <div class="checkgrid" id="s_params">
        ${Object.keys(PARAMS).map(k=>`<label class="chk ${s.params&&s.params.find(p=>p.key===k)?'on':''}"><input type="checkbox" value="${k}" ${s.params&&s.params.find(p=>p.key===k)?'checked':''}><span>${k}</span></label>`).join('')}
      </div></div>
  </div>`;
  const foot=el('div');
  const cancel=el('button','btn btn-ghost','Cancel');cancel.onclick=closeModal;
  const saveb=el('button','btn btn-primary',existing?'Save changes':'Register site');
  saveb.onclick=()=>{
    const name=$('#s_name').value.trim(),code=(existing?s.id:$('#s_code').value.trim().toUpperCase());
    const picks=[...document.querySelectorAll('#s_params input:checked')].map(x=>x.value);
    if(!name||!code||!picks.length){toast('Name, code and at least one parameter are required.','crit');return;}
    if(!existing&&STATE.sites.find(x=>x.id.toUpperCase()===code)){toast('That industry code already exists.','crit');return;}
    const base={name,id:code,sector:$('#s_sector').value||'—',loc:$('#s_loc').value||'—',
      lat:+$('#s_lat').value||28.6,lng:+$('#s_lng').value||77.2,spcb:$('#s_spcb').value,
      category:$('#s_cat').value,stacks:+$('#s_stk').value||0,etp:+$('#s_etp').value||0,
      contact:$('#s_contact').value||'—',phone:$('#s_phone').value||'—',
      ganga:$('#s_cat').value.includes('Ganga')};
    if(existing){
      Object.assign(s,base);
      // reconcile params: keep existing, add new, drop removed
      const kept=s.params.filter(p=>picks.includes(p.key));
      kept.forEach(p=>{if(!p.pid)p.pid=pidFor(s.id,p.key);}); // backfill IDs on older data
      picks.forEach(k=>{if(!kept.find(p=>p.key===k))kept.push(seedParam(k,'green',s.id));});
      s.params=kept;s.signal=rollup(s.params,s.running?'green':'grey',s.enabled);
      toast(name+' updated.');
    }else{
      const params=picks.map(k=>seedParam(k,'green',code));
      STATE.sites.push({...base,params,connectivity:'live',enabled:true,running:true,

      toast(name+' registered · code '+code+' · passcode 1234.');
    }
    save();closeModal();render();
  };
  foot.append(cancel,saveb);
  modal(existing?'Edit Site':'Register New Site',b,foot);
}

→ { "readings": [
     { "siteId":"ESK-4417", "param":"PM", "value":42.7, "ts":1720000000000 },
     { "pid":"ESK-4417-SO2", "value":180.4 }
   ] }</div>
    Identify each channel by <b>siteId + param</b> or by the unique <b>pid</b>. <code>ts</code> is optional.
    <br><br><b>Option B — Manual / custom push.</b> From your own script or the browser console you can call:
    <div style="font-family:var(--mono);font-size:12px;background:var(--paper);border:1px solid var(--paper-line);border-radius:8px;padding:10px 12px;margin:10px 0;white-space:pre-wrap">ingestReadings([
  { siteId:"ESK-4417", param:"PM", value:42.7 }
]);</div>
    This applies the reading, re-grades against CPCB thresholds, updates charts, and saves — with no simulator involved.
    </div>`;
  wrap.append(help);

}

  const searchRow=el('div');searchRow.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap';
  const inp=el('input','search');inp.placeholder='Search industry…';inp.value=SVC_QUERY||'';
  searchRow.append(inp);ph.append(searchRow);panel.append(ph);
  const w=el('div');w.style.overflowX='auto';

  t.innerHTML=`<thead><tr><th>Industry</th><th>Services</th><th>Active value / yr</th><th>Soonest expiry</th><th>Status</th>${canManage?'<th>Manage</th>':''}</tr></thead>`;
  const tb=el('tbody');tb.id='svcTblBody';
  function fill(q){
    tb.innerHTML='';
    const ql=(q||'').trim().toLowerCase();
    let list=sites.slice();
    if(ql)list=list.filter(s=>s.name.toLowerCase().includes(ql)||s.id.toLowerCase().includes(ql));
    if(!list.length){tb.innerHTML=`<tr><td colspan="6"><div class="empty">No industry matches “${q}”.</div></td></tr>`;return;}
    list.forEach(s=>{
      const keys=serviceKeys(s);
      let val=0;keys.forEach(k=>{const c=s.services[k];if(c&&!c.suspended){const st=serviceStatus(c);if(st.code!=='expired'&&st.code!=='none'){const ti=pkgGroup_fromPackageId(c.package,s);if(ti)val+=ti.price;}}});
      const a=siteServiceAlert(s);
      const soonest=a&&a.days!=null?(a.days<0?'Expired':a.days+' days'):'—';
      const tr=el('tr');

      tr.innerHTML=cells;

  }
  t.append(tb);w.append(t);panel.append(w);wrap.append(panel);
  inp.addEventListener('input',()=>{SVC_QUERY=inp.value;fill(inp.value);});

  setTimeout(()=>{drawSvcCharts(sites);fill(SVC_QUERY);},30);
  return wrap;
}

function drawSvcCharts(sites){
  if(!window.Chart)return;
  // revenue by service group (active, non-suspended) — per-site catalogues
  const rev={};
  sites.forEach(s=>{if(!s.services)return;serviceKeys(s).forEach(k=>{
    const c=s.services[k];if(!c||c.suspended)return;
    const st=serviceStatus(c);if(st.code==='expired'||st.code==='none')return;
    const tier=pkgGroup_fromPackageId(c.package,s);const g=pkgGroup(k);
    rev[g]=(rev[g]||0)+(tier?tier.price:0);
  });});
  const rc=$('#chSvcRev');
  if(rc){
    const labels=Object.keys(rev);const vals=labels.map(l=>rev[l]);
    if(!labels.length){rc.parentElement.innerHTML='<div class="empty">No active priced contracts yet.</div>';}
    else CHARTS.svcRev=new Chart(rc,{type:'bar',data:{labels,datasets:[{data:vals,
      backgroundColor:['#1B5E20','#0aa4b0','#e8722b','#7b3fe4','#b98a1e','#3b82c4'],borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>'₹'+c.parsed.y.toLocaleString('en-IN')}}},
        scales:{y:{beginAtZero:true,ticks:{callback:v=>'₹'+(v/1000)+'k'}}}}});
  }
  // status counts across all contracts
  const sc={Active:0,'≤2m':0,'≤1m/15d':0,'≤1wk/exp':0,Suspended:0};
  sites.forEach(s=>{if(!s.services)return;serviceKeys(s).forEach(k=>{
    const c=s.services[k];if(!c)return;const st=serviceStatus(c);
    if(st.code==='suspended')sc.Suspended++;
    else if(st.code==='ok')sc.Active++;
    else if(st.code==='m2')sc['≤2m']++;
    else if(st.code==='m1'||st.code==='d15')sc['≤1m/15d']++;
    else if(st.code==='week'||st.code==='expired')sc['≤1wk/exp']++;
  });});
  const stc=$('#chSvcStatus');
  if(stc)CHARTS.svcStatus=new Chart(stc,{type:'doughnut',data:{labels:Object.keys(sc),
    datasets:[{data:Object.values(sc),backgroundColor:['#1fa971','#f5c518','#e8722b','#e23b2e','#8a978d'],borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}}}});
}

/* ---- manage a single industry's OWN services, rates & contracts ---- */
function manageSiteServices(site){
  const isAdmin=STATE.session.role==='admin';
  if(!site.catalogue)site.catalogue=clonePackages();
  const b=el('div');
  const info=el('div');info.style.cssText='font-size:12.5px;color:var(--mute);margin-bottom:14px';
  info.innerHTML=`<b style="color:var(--ink)">${site.name}</b> · ${site.id} — this industry has its own independent services &amp; rates.`;
  b.append(info);

  function syncBehind(){if(VIEW==='services')render();}
  function rebuild(){closeModal();manageSiteServices(site);}

  /* ===== SECTION A: this industry's rate card (services & packages) ===== */
  const secA=el('div');
  const aHead=el('div');aHead.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px';
  aHead.innerHTML=`<h3 style="font-size:14px">Services &amp; Rates</h3>`;
  const addSvcBtn=el('button','btn btn-sm btn-primary','＋ Add service');addSvcBtn.onclick=()=>serviceTypeForm(site,null,rebuild);
  aHead.append(addSvcBtn);secA.append(aHead);
  Object.keys(site.catalogue).forEach(group=>{
    const m=site.catalogue[group];
    const block=el('div');block.style.cssText='margin-bottom:12px;border:1px solid var(--paper-line);border-radius:9px;overflow:hidden';
    const head=el('div');head.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--paper);gap:8px;flex-wrap:wrap';
    head.innerHTML=`<div><b>${group}</b> · ${m.name} <span style="color:var(--mute);font-size:11px">${m.perEquip?'(Gas/Water/SPM)':'(single)'}</span></div>`;
    const hb=el('div');hb.style.cssText='display:flex;gap:5px';
    const addPkg=el('button','btn btn-sm btn-ghost','＋ Pkg');addPkg.onclick=()=>tierForm(site,group,null,rebuild);
    hb.append(addPkg);
    const delSvc=el('button','btn btn-sm btn-red','✕');delSvc.title='Delete service';
    delSvc.onclick=()=>{if(confirm('Delete service '+group+' from '+site.name+'? Its contracts here will be removed.')){
      delete site.catalogue[group];
      if(site.services)Object.keys(site.services).forEach(k=>{if(pkgGroup(k)===group)delete site.services[k];});
      save();toast(group+' removed from '+site.name+'.');syncBehind();rebuild();}};
    hb.append(delSvc);head.append(hb);block.append(head);
    const tw=el('div');tw.style.overflowX='auto';const tt=el('table','tbl');
    tt.innerHTML=`<thead><tr><th>Package</th><th>Months</th><th>Rate (₹)</th><th></th></tr></thead>`;
    const ttb=el('tbody');
    m.tiers.forEach(tier=>{
      const tr=el('tr');
      tr.innerHTML=`<td><b>${tier.label}</b></td><td class="mono">${tier.months}</td><td class="mono">₹${(tier.price||0).toLocaleString('en-IN')}</td>`;
      const at=el('td');at.style.whiteSpace='nowrap';
      const eb=el('button','btn btn-sm btn-ghost','Edit');eb.onclick=()=>tierForm(site,group,tier.id,rebuild);
      at.append(eb);
      const rb=el('button','btn btn-sm btn-red','✕');rb.style.marginLeft='5px';
      rb.onclick=()=>{if(m.tiers.length<=1){toast('Keep at least one package.','crit');return;}
        if(confirm('Remove package '+tier.label+'?')){m.tiers=m.tiers.filter(x=>x.id!==tier.id);site.catalogue[group].tiers=m.tiers;save();toast('Package removed.');rebuild();}};
      at.append(rb);tr.append(at);ttb.append(tr);
    });
    tt.append(ttb);tw.append(tt);block.append(tw);secA.append(block);
  });
  b.append(secA);

  /* ===== SECTION B: this industry's contracts ===== */
  const secB=el('div');secB.style.cssText='margin-top:18px;padding-top:16px;border-top:2px solid var(--paper-line)';
  secB.append(el('h3',null,'Contracts')); secB.querySelector('h3').style.cssText='font-size:14px;margin-bottom:10px';
  const list=el('div');list.style.cssText='display:flex;flex-direction:column;gap:8px';
  function refresh(){
    list.innerHTML='';
    catalogueKeys(site).forEach(k=>{
      const c=site.services&&site.services[k];if(!c)return;
      const L=serviceLabel(k,site);const st=serviceStatus(c);
      const row=el('div');row.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--paper-line);border-radius:9px;flex-wrap:wrap';
      row.innerHTML=`<div style="flex:1;min-width:150px"><b>${L.type}${L.equip!=='—'?' · '+L.equip:''}</b>
        <div style="font-size:11px;color:var(--mute)">${c.expiry?'till '+fmtDay(c.expiry):'not set'}</div></div>
        <span class="badge" style="background:${st.hex}">${st.label}</span>`;
      const btns=el('div');btns.style.cssText='display:flex;gap:6px';
      const edit=el('button','btn btn-sm btn-ghost','Edit');edit.onclick=()=>editContractDate(site,k);
      const stop=el('button','btn btn-sm btn-ghost',c.suspended?'▶ Resume':'⏸ Stop');
      stop.onclick=()=>{c.suspended=!c.suspended;save();toast((L.type)+(L.equip!=='—'?' · '+L.equip:'')+(c.suspended?' suspended.':' resumed.'));refresh();syncBehind();};
      btns.append(edit,stop);
      if(isAdmin){
        const del=el('button','btn btn-sm btn-red','Delete');
        del.onclick=()=>{if(confirm('Delete this contract from '+site.name+'?')){delete site.services[k];save();toast('Contract deleted.');refresh();syncBehind();}};
        btns.append(del);
      }
      row.append(btns);list.append(row);
    });
    if(!list.children.length)list.innerHTML='<div class="empty">No contracts yet. Add one below.</div>';
  }
  refresh();secB.append(list);
  // add-contract control
  const addWrap=el('div');addWrap.style.cssText='margin-top:12px';
  const missing=catalogueKeys(site).filter(k=>!(site.services&&site.services[k]));
  if(missing.length){
    addWrap.innerHTML=`<label style="font-size:12.5px;font-weight:600;display:block;margin-bottom:6px">Add a contract</label>`;
    const rowc=el('div');rowc.style.cssText='display:flex;gap:8px;flex-wrap:wrap';
    const sel=el('select');sel.style.cssText='flex:1;min-width:180px;padding:8px 11px;border:1px solid var(--paper-line);border-radius:9px;font-size:13px';
    sel.innerHTML=missing.map(k=>{const L=serviceLabel(k,site);return `<option value="${k}">${L.type}${L.equip!=='—'?' · '+L.equip:''}</option>`;}).join('');
    const addb=el('button','btn btn-sm btn-primary','＋ Add contract');
    addb.onclick=()=>{const k=sel.value;const g=pkgGroup(k);const tier=pkgTiers(g,site)[0];
      if(!site.services)site.services={};
      site.services[k]={start:Date.now(),expiry:addMonths(Date.now(),tier?tier.months:12),package:tier?tier.id:null,history:[],suspended:false};
      save();toast('Contract added to '+site.name+'.');syncBehind();rebuild();};
    rowc.append(sel,addb);addWrap.append(rowc);
  }else{
    addWrap.innerHTML='<div style="font-size:12px;color:var(--mute)">All services in this industry\u2019s rate card already have contracts.</div>';
  }
  secB.append(addWrap);b.append(secB);

  const foot=el('div');const close=el('button','btn btn-ghost','Done');close.onclick=()=>{closeModal();if(VIEW==='services')render();};
  foot.append(close);
  modal('Manage — '+site.name,b,foot);
}

/* ---- export all service data (admin): Excel + PDF ---- */
function exportAllServices(fmt){
  const rows=[];
  STATE.sites.forEach(s=>{
    serviceKeys(s).forEach(k=>{
      const c=s.services[k];const L=serviceLabel(k,s);const st=serviceStatus(c);
      const tier=pkgGroup_fromPackageId(c.package,s);
      rows.push({Industry:s.name,Code:s.id,Service:L.type,Equipment:L.equip,ServiceName:L.name,
        Package:tier?tier.label:'—',Rate:tier?tier.price:0,
        Start:c.start?fmtDay(c.start):'—',Expiry:c.expiry?fmtDay(c.expiry):'—',
        Status:st.label,Renewals:(c.history&&c.history.length)||0});
    });
  });
  if(!rows.length){toast('No contract data to export.','crit');return;}
  if(fmt==='xls'){
    if(!window.XLSX){toast('Excel library not loaded.','crit');return;}
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Service Contracts');
    // renewal history sheet
    const hist=[];STATE.sites.forEach(s=>serviceKeys(s).forEach(k=>{const c=s.services[k];(c.history||[]).forEach(h=>{
      hist.push({Industry:s.name,Code:s.id,Service:serviceLabel(k,s).type,Equipment:serviceLabel(k,s).equip,
        Package:h.package,Months:h.months,Rate:h.price,On:fmtDay(h.at),Till:fmtDay(h.till),By:h.by});});}));
    if(hist.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(hist),'Renewal History');
    XLSX.writeFile(wb,'Saaphzone_Service_Contracts.xlsx');
    toast('All service data exported to Excel.');return;
  }
  if(fmt==='pdf'){
    if(!window.jspdf){toast('PDF library not loaded.','crit');return;}
    const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape'});
    doc.setFontSize(15);doc.setTextColor(27,94,32);doc.text('Saaphzone — Service Contracts (All Industries)',14,15);
    doc.setFontSize(9);doc.setTextColor(90,107,96);
    doc.text('Generated '+new Date().toLocaleString('en-IN')+' · '+rows.length+' contracts across '+STATE.sites.length+' industries',14,21);
    runAutoTable(doc,{startY:26,
      head:[['Industry','Code','Service','Equip','Package','Rate ₹','Expiry','Status']],
      body:rows.map(r=>[r.Industry,r.Code,r.Service,r.Equipment,r.Package,(r.Rate||0).toLocaleString('en-IN'),r.Expiry,r.Status]),
      styles:{fontSize:7,cellPadding:1.5},headStyles:{fillColor:[27,94,32]},alternateRowStyles:{fillColor:[243,246,242]},margin:{left:14,right:14}});
    doc.setFontSize(8);doc.setTextColor(140,163,150);
    doc.text('Confidential · www.saaphzone.com',14,doc.internal.pageSize.height-8);
    doc.save('Saaphzone_Service_Contracts.pdf');
    toast('All service data exported to PDF.');return;
  }
}

/* autoTable compatibility across plugin versions */
function runAutoTable(doc,opts){
  if(typeof doc.autoTable==='function'){doc.autoTable(opts);return;}
  if(window.jspdf&&typeof window.jspdf.autoTable==='function'){window.jspdf.autoTable(doc,opts);return;}

/* ---- synth historical rows for a site over a range ---- */
function synthRows(site,fromT,toT,stepMin){
  const rows=[];const step=stepMin*60000;
  for(let t=fromT;t<=toT;t+=step){
    const row={time:new Date(t).toLocaleString('en-IN',{hour12:false})};
    site.params.forEach(p=>{
      const def=PARAMS[p.key]||{};const lim=def.limit||p.limit;
      let v=def.ph?7.0+Math.sin(t/3.6e6)*0.6+(Math.random()-0.5)*0.3
        :lim*(0.5+Math.random()*0.35);
      row[p.key]=+v.toFixed(2);
    });
    rows.push(row);
  }
  return rows;
}
function rangeFor(kind){
  const now=Date.now();const day=86400000;
  if(kind==='daily')return[now-day,now,15];
  if(kind==='monthly')return[now-30*day,now,180];
  if(kind==='quarterly')return[now-90*day,now,720];
  return[now-7*day,now,60];
}

function getReportData(){
  const site=STATE.sites.find(s=>s.id===$('#r_site').value);
  const period=$('#r_period').value;
  let from,to,step;
  if(period==='custom'){
    const f=$('#r_from').value,t=$('#r_to').value;
    if(!f||!t){toast('Pick both custom dates.','crit');return null;}
    from=new Date(f).getTime();to=new Date(t).getTime()+86400000;
    step=(to-from)/86400000>31?720:180;
  }else{[from,to,step]=rangeFor(period);}
  const rows=synthRows(site,from,to,step);
  return {site,period,from,to,rows,cols:['time',...site.params.map(p=>p.key)]};
}

/* ================= LIVE SIMULATION ================= */
/* =========================================================
   REAL DATA INGESTION
   Apply an array of readings to STATE. Call this from your own
   integration, or it's called automatically by pollLiveData()
   when DATA_MODE='live'. Each reading: {siteId,param|pid,value,ts?}
   ========================================================= */
function ingestReadings(readings){
  if(!Array.isArray(readings)||!readings.length)return {applied:0};
  let applied=0,touched={};
  readings.forEach(r=>{
    let site=null,p=null;
    if(r.pid){
      for(const s of STATE.sites){const hit=(s.params||[]).find(x=>x.pid===r.pid);if(hit){site=s;p=hit;break;}}
    }
    if(!p&&r.siteId){
      site=STATE.sites.find(s=>s.id===r.siteId);
      if(site)p=(site.params||[]).find(x=>x.key===r.param);
    }
    if(!site||!p)return; // unknown channel — skip
    const v=+r.value;if(isNaN(v))return;
    const n=PARAMS[p.key]||{limit:p.limit};
    const prev=p.signal;
    p.value=+v.toFixed(2);
    if(n.ph){p.phVal=p.value;}
    p.history.push(p.value);if(p.history.length>24)p.history.shift();
    const lim=n.limit||p.limit;
    const over=n.ph?(p.value>lim||p.value<(n.min||6.5)):(p.value>lim);
    if(over){p.excStreak++;p.yToday++;p.y30++;}else p.excStreak=Math.max(0,p.excStreak-1);
    // real data arriving means the channel is connected
    p.connFailHrsToday=0;p.connHrs=0;
    p.signal=gradeParameter(p);
    site.connectivity='live';site.running=true;
    site.lastData=r.ts?fmtTime(new Date(r.ts)):'just now';
    touched[site.id]=site;
    if(RANK[p.signal]>RANK[prev]&&['yellow','orange','red','purple'].includes(p.signal)){
      STATE.alerts.unshift({id:'ALT-'+rid(),site:site.name,siteId:site.id,param:p.key,
        level:p.signal,reason:triggerReason(p),time:Date.now()});
      if(STATE.alerts.length>120)STATE.alerts.pop();
      const sess=STATE.session;
      if(sess&&(sess.role!=='industry'||sess.siteId===site.id))
        toast(`${SIG_LABEL[p.signal]} · ${site.name} — ${p.key} ${p.value}${p.unit}`,(p.signal==='red'||p.signal==='purple')?'crit':'alert');
    }
    applied++;
  });
  Object.values(touched).forEach(s=>{s.signal=rollup(s.params,s.running?'green':'grey',s.enabled);});
  if(applied){save();refreshLiveViews();}
  return {applied};
}
/* expose for external integrations / console use */
if(typeof window!=='undefined'){
  window.ingestReadings=ingestReadings;
}

let lastPollTs=0, pollTimer=null;
async function pollLiveData(){
  if(DATA_CFG.mode!=='live'||!DATA_CFG.apiBase)return;
  if(typeof fetch!=='function'){console.warn('fetch unavailable in this environment');return;}
  try{
    const url=DATA_CFG.apiBase.replace(/\/$/,'')+'/readings?since='+(lastPollTs||0);
    const headers={'Accept':'application/json','ngrok-skip-browser-warning':'true'};
    if(DATA_CFG.apiKey)headers['Authorization']='Bearer '+DATA_CFG.apiKey;
    const res=await fetch(url,{headers});
    if(!res.ok){console.warn('poll failed',res.status);return;}
    const data=await res.json();
    const readings=data.readings||data||[];
    if(readings.length){lastPollTs=Date.now();ingestReadings(readings);}
  }catch(e){console.warn('poll error',e.message);}
}
function refreshLiveViews(){
  if(VIEW==='home'){const sites=visibleSites();refreshKPIs(sites);renderCards(sites);updateMarkers(sites);}
  else if(VIEW==='map')updateMarkers(visibleSites());
  else if(VIEW==='alerts')render();
  else if((VIEW==='detail'||VIEW==='mysite')&&SELECTED)render();
}

/* SIMULATION tick — only runs when DATA_MODE='simulation' */
function tick(){
  if(DATA_CFG.mode!=='simulation')return; // real/off modes: no fake data
  let changed=false;
  STATE.sites.forEach(site=>{
    if(!site.running||site.connectivity==='grey'||site.enabled===false)return;
    site.params.forEach(p=>{
      const prev=p.signal;const n=PARAMS[p.key]||{limit:p.limit};
      let drift=(Math.random()-0.48)*(n.limit||p.limit)*0.06;
      if(p.stableHrs>0){drift=(Math.random()-0.5)*(n.limit||p.limit)*0.002;p.stableHrs+=0.25;}
      p.value=Math.max(0,+(p.value+drift).toFixed(1));
      if(n.ph){p.value=Math.min(14,Math.max(0,p.value));p.phVal=p.value;}
      p.history.push(p.value);if(p.history.length>24)p.history.shift();
      const lim=n.limit||p.limit;
      const over=n.ph?(p.value>lim||p.value<(n.min||6.5)):(p.value>lim);
      if(over){p.excStreak++;if(Math.random()<0.3){p.yToday++;p.y30++;}}
      else p.excStreak=Math.max(0,p.excStreak-1);
      p.signal=gradeParameter(p);
      if(RANK[p.signal]>RANK[prev]&&['yellow','orange','red','purple'].includes(p.signal)){
        STATE.alerts.unshift({id:'ALT-'+rid(),site:site.name,siteId:site.id,param:p.key,
          level:p.signal,reason:triggerReason(p),time:Date.now()});
        if(STATE.alerts.length>120)STATE.alerts.pop();
        // notify: admins/engineers see all; industry sees only their own
        const sess=STATE.session;
        if(sess&&(sess.role!=='industry'||sess.siteId===site.id)){
          toast(`${SIG_LABEL[p.signal]} · ${site.name} — ${p.key} ${p.value}${p.unit}`,
            (p.signal==='red'||p.signal==='purple')?'crit':'alert');
        }
        changed=true;
      }
    });
    site.signal=rollup(site.params,site.running?'green':'grey',site.enabled);
    if(site.running&&site.connectivity!=='delay')site.lastData='just now';
  });
  if(changed)save();
  // refresh live views
  if(VIEW==='home'){const sites=visibleSites();refreshKPIs(sites);renderCards(sites);updateMarkers(sites);}
  else if(VIEW==='map')updateMarkers(visibleSites());
  else if(VIEW==='alerts')render();
  else if((VIEW==='detail'||VIEW==='mysite')&&SELECTED)render();
}
function refreshKPIs(sites){
  const k=computeKPIs(sites);
  const vals=[k.green,k.yellow,k.red+k.orange+k.purple,k.grey+k.delay,k.total,k.alerts24];
  document.querySelectorAll('.kpi .kv').forEach((n,i)=>{if(vals[i]!=null)n.textContent=vals[i];});
}
function updateMarkers(sites){
  if(!MAP)return;
  sites.forEach(s=>{const m=MARKERS[s.id];if(m)m.setStyle({fillColor:HEX[s.signal]||HEX.grey});});
}
